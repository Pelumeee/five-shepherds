<div class="animate-pulse">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div class="space-y-3">
      <div class="h-6 w-40 bg-gray-300 rounded"></div>
      <div class="h-4 w-72 bg-gray-200 rounded"></div>
    </div>
  </div>

  <!-- Info banner -->
  <div class="my-10 p-4 bg-gray-100 border border-gray-200 rounded-lg flex justify-between">
    <div class="flex gap-3">
      <div class="w-5 h-5 bg-gray-300 rounded"></div>
      <div class="space-y-2">
        <div class="h-4 w-40 bg-gray-300 rounded"></div>
        <div class="h-3 w-64 bg-gray-200 rounded"></div>
      </div>
    </div>
    <div class="w-3 h-3 bg-gray-300 rounded"></div>
  </div>

  <!-- Stats summary -->
  <div class="grid grid-cols-4 py-6 gap-2 bg-white rounded">
    @for (item of [1, 2, 3, 4]; track item) {
      <div class="text-center border-r border-gray-200 last:border-none space-y-3">
        <div class="h-3 w-24 mx-auto bg-gray-200 rounded"></div>
        <div class="h-6 w-16 mx-auto bg-gray-300 rounded"></div>
      </div>
    }
  </div>

  <div class="w-full h-1.5 bg-gray-200 my-10 rounded"></div>

  <!-- Filters -->
  <div class="flex items-center justify-between my-10">
    <div class="flex gap-5">
      <div class="h-10 w-32 bg-gray-200 rounded"></div>
      <div class="h-10 w-40 bg-gray-200 rounded"></div>
    </div>

    <div class="h-10 w-[30%] bg-gray-200 rounded"></div>
  </div>

  <!-- Order cards -->
  <div class="my-10 flex flex-col gap-4">
    @for (card of [1, 2, 3]; track card) {
      <div class="bg-white rounded-lg px-8 py-6 border-l-4 border-gray-200 space-y-6">
        <!-- Top row -->
        <div class="flex justify-between items-start">
          <div class="flex gap-4">
            <div class="w-16 h-16 bg-gray-200 rounded"></div>

            <div class="space-y-2">
              <div class="h-4 w-40 bg-gray-300 rounded"></div>
              <div class="h-3 w-32 bg-gray-200 rounded"></div>

              <div class="flex gap-4">
                <div class="h-3 w-28 bg-gray-200 rounded"></div>
                <div class="h-3 w-24 bg-gray-200 rounded"></div>
              </div>
            </div>
          </div>

          <div class="h-6 w-20 bg-gray-200 rounded-2xl"></div>
        </div>

        <!-- Price box -->
        <div class="bg-gray-100 border border-gray-200 rounded-xl px-3 py-5 space-y-3">
          @for (row of [1, 2, 3]; track row) {
            <div class="flex justify-between">
              <div class="h-3 w-24 bg-gray-200 rounded"></div>
              <div class="h-3 w-20 bg-gray-300 rounded"></div>
            </div>
          }

          <div class="border-t border-gray-200 pt-3 space-y-3">
            <div class="flex justify-between">
              <div class="h-3 w-28 bg-gray-200 rounded"></div>
              <div class="h-3 w-20 bg-gray-200 rounded"></div>
            </div>

            <div class="flex justify-between">
              <div class="h-4 w-24 bg-gray-300 rounded"></div>
              <div class="h-4 w-24 bg-gray-300 rounded"></div>
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <div class="grid grid-cols-3 gap-5">
          <div class="h-10 bg-gray-300 rounded"></div>
          <div class="h-10 bg-gray-200 rounded"></div>
          <div class="h-10 bg-gray-200 rounded"></div>
        </div>
      </div>
    }
  </div>
</div>
